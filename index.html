<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="hilltopads-site-verification" content="7e305405855d9c01a450" />
    <title>WinGo VIP - Auto Mode</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg:#f7f8ff; --blue:#2b3270; --red:#d93d3d; --green:#4caf50; --violet:#b659fe; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; user-select: none; }
        body { background: var(--bg); padding-bottom: 80px; }
        .navbar { background: #fff; padding: 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 50; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .logo { font-size: 22px; font-weight: bold; color: #333; font-style: italic; }
        .wallet-card { background: var(--blue); padding: 25px; color: white; text-align: center; border-radius: 0 0 30px 30px; margin-bottom: 20px; box-shadow: 0 5px 15px rgba(43, 50, 112, 0.3); }
        .bal-amt { font-size: 36px; font-weight: bold; margin: 10px 0; }
        .w-btn { flex: 1; padding: 12px; border-radius: 50px; border: none; font-weight: bold; color: white; font-size: 15px; margin: 0 5px; cursor: pointer; }
        .btn-w { background: rgba(255,255,255,0.2); } 
        .btn-d { background: var(--green); box-shadow: 0 4px 10px rgba(76,175,80,0.4); }
        .board { background: #fff; margin: 20px 15px; padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .info { display: flex; justify-content: space-between; margin-bottom: 20px; align-items: center; }
        .timer-box { display: flex; gap: 4px; font-size: 22px; font-weight: bold; color: var(--blue); }
        .digit { background: #f0f0f0; padding: 4px 8px; border-radius: 6px; }
        .colors { display: flex; gap: 10px; margin-bottom: 20px; }
        .btn-c { flex: 1; padding: 14px; border: none; border-radius: 10px; color: white; font-weight: bold; font-size: 16px; cursor: pointer; }
        .g { background: var(--green); } .v { background: var(--violet); } .r { background: var(--red); }
        .nums { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 20px; }
        .n-btn { width: 100%; aspect-ratio: 1; border-radius: 50%; border: none; font-size: 18px; font-weight: bold; color: white; cursor: pointer; }
        .b-g { background: var(--green); } .b-r { background: var(--red); }
        .b-0 { background: linear-gradient(135deg, var(--red) 50%, var(--violet) 50%); }
        .b-5 { background: linear-gradient(135deg, var(--green) 50%, var(--violet) 50%); }
        .btn-s { flex: 1; padding: 12px; border-radius: 30px; border: none; color: white; font-weight: bold; font-size: 16px; }
        .big { background: orange; } .small { background: #5da7f0; }
        #rewardStatus { display:none; position:fixed; top:20px; left:50%; transform:translateX(-50%); background:black; color:gold; padding:10px 20px; border-radius:50px; z-index:1000; font-weight:bold; border:2px solid gold; animation: blink 1s infinite; }
        @keyframes blink { 0% {opacity:1;} 50% {opacity:0.5;} 100% {opacity:1;} }
    </style>
</head>
<body>

<div id="rewardStatus">🔄 ADS RUNNING IN BACKTAB...</div>

<div class="navbar">
    <div class="logo">WIN GO VIP</div>
    <div style="color:green; font-size:12px;"><i class="fas fa-robot"></i> AUTO BOT ACTIVE</div>
</div>

<div class="wallet-card">
    <div style="font-size:14px; opacity:0.8;">Available Balance</div>
    <div class="bal-amt">₹ <span id="bal">10.00</span></div>
    <div style="display:flex;">
        <button class="w-btn btn-w">Withdraw</button>
        <button class="w-btn btn-d" onclick="handleAutoAd()">Add Coins</button>
    </div>
</div>

    

<div class="board">
    <div class="info">
        <div>
            <div style="font-size:12px; color:#888;">Period</div>
            <div style="font-size:18px; font-weight:bold;" id="pid">Loading...</div>
        </div>
        <div style="text-align:right;">
            <div style="font-size:12px; color:#888;">Next Bet</div>
            <div class="timer-box">
                <div class="digit" id="s1">0</div><div class="digit" id="s2">0</div>
            </div>
        </div>
    </div>
    <div class="colors">
        <button class="btn-c g">Green</button>
        <button class="btn-c v">Violet</button>
        <button class="btn-c r">Red</button>
    </div>
    <div class="nums">
        <button class="n-btn b-0">0</button><button class="n-btn b-g">1</button><button class="n-btn b-r">2</button><button class="n-btn b-g">3</button><button class="n-btn b-r">4</button>
        <button class="n-btn b-5">5</button><button class="n-btn b-r">6</button><button class="n-btn b-g">7</button><button class="n-btn b-r">8</button><button class="n-btn b-g">9</button>
    </div>
</div>

<script>
    // # <--- YAHAN HAI MONETAG/HILLTOP AD LINK
    const SMART_LINK = "https://idealistic-revenue.com/kK2Uag"; 
    
    let balance = 10; 
    const betCost = 10; 

    window.onload = () => {
        const savedBal = localStorage.getItem('wingo_bal');
        if(savedBal) balance = parseFloat(savedBal);
        updateUI();
        startAutoGame();
        startTimer();
    };

    function updateUI() {
        document.getElementById('bal').innerText = balance.toFixed(2);
        localStorage.setItem('wingo_bal', balance);
    }

    function startTimer() {
        setInterval(() => {
            const now = new Date();
            const rem = 30 - (Math.floor(now.getTime()/1000) % 30);
            document.getElementById('s1').innerText = Math.floor(rem/10);
            document.getElementById('s2').innerText = rem % 10;
            document.getElementById('pid').innerText = "20260318" + Math.floor(now.getTime()/30000);
            if(rem === 1) { 
                if(Math.random() > 0.7) balance += betCost * 1.9;
                updateUI();
            }
        }, 1000);
    }

    function startAutoGame() {
        setInterval(() => {
            if (balance >= betCost) {
                balance -= betCost;
                updateUI();
                console.log("Auto-Bet Placed");
            } else {
                handleAutoAd(); 
            }
        }, 15000); 
    }

    function handleAutoAd() {
        const status = document.getElementById('rewardStatus');
        status.style.display = 'block';
        
        // Ad Window kholna
        let adWin = window.open(SMART_LINK, "_blank"); 

        // 20 sec baad game tab ko refresh karna taaki woh front par aa jaye
        setTimeout(() => {
            if(adWin) adWin.close(); // Browser support karega toh close kar dega
            balance += 15; // Reward thoda badhaya hai (₹15)
            updateUI();
            status.style.display = 'none';
            
            // Loop ko reset karne ke liye hard refresh
            location.reload(); 
        }, 20000); 
    }

    // IP REFRESH (Har 15 min mein VPN ke liye)
    setTimeout(() => { location.reload(); }, 900000); 

</script>
</body>
</html>
